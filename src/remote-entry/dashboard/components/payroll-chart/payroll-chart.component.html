<article class="chart-panel">
  <div class="panel-head">
    <h3>Collections Overview</h3>
    <p>{{ yearLabel }}</p>
  </div>

  <div class="chart-body">
    <div class="donut-section">
      <svg viewBox="0 0 120 120" class="donut-svg" aria-label="Plans distribution donut chart">
        <circle
          cx="60" cy="60"
          [attr.r]="r"
          fill="none"
          stroke="#f0f2f4"
          stroke-width="12"
        />
        @for (seg of chartSegments; track seg.label) {
          <circle
            cx="60" cy="60"
            [attr.r]="r"
            fill="none"
            [attr.stroke]="seg.color"
            stroke-width="12"
            stroke-linecap="butt"
            [attr.stroke-dasharray]="seg.dashArray"
            [attr.stroke-dashoffset]="seg.dashOffset"
          />
        }
        <text x="60" y="55" text-anchor="middle" class="donut-count">{{ total }}</text>
        <text x="60" y="69" text-anchor="middle" class="donut-sub">Plans</text>
      </svg>

      <div class="legend">
        @for (stat of planStats; track stat.label) {
          <div class="legend-item">
            <span class="legend-dot" [style.background]="stat.color"></span>
            <span class="legend-label">{{ stat.label }}</span>
            <span class="legend-count">{{ stat.count }}</span>
          </div>
        }
      </div>
    </div>

    <div class="stats-section">
      <div class="rate-card">
        <svg viewBox="0 0 120 120" class="rate-svg" aria-label="Success rate ring">
          <circle cx="60" cy="60" [attr.r]="r" fill="none" stroke="#f0f2f4" stroke-width="10" />
          <circle
            cx="60" cy="60"
            [attr.r]="r"
            fill="none"
            stroke="#22c55e"
            stroke-width="10"
            stroke-linecap="round"
            [attr.stroke-dasharray]="successRingDash"
            [attr.stroke-dashoffset]="successRingOffset"
          />
          <text x="60" y="55" text-anchor="middle" class="rate-count">{{ successRate }}%</text>
          <text x="60" y="69" text-anchor="middle" class="rate-sub">Success</text>
        </svg>
        <p class="rate-label">Collection success rate</p>
      </div>
    </div>
  </div>
</article>
