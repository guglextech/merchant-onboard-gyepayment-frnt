<section class="panel">
  <div class="panel-head">
    <h2>Customer Directory</h2>
    <div class="panel-head__actions">
      <span class="panel-head__label">Filter by Channel</span>
      <select
        class="status-filter"
        [value]="selectedChannel"
        (change)="onChannelChange($any($event.target).value)"
      >
        @for (option of channelFilterOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </div>
  </div>

  <div class="customer-table">
    <lib-data-table
      [columns]="columns"
      [rows]="rows"
      [rowActions]="rowActions"
      [loading]="loading()"
      [trackByKey]="'id'"
      [searchable]="true"
      [serverSide]="true"
      [totalItems]="totalCustomers()"
      [initialPageSize]="tablePageSize"
      [pageSizeOptions]="tablePageSizeOptions"
      [searchPlaceholder]="'Search by name, phone, or channel...'"
      [emptyMessage]="'No customers found for the selected filter.'"
      (queryChange)="onTableQueryChange($event)"
      (rowAction)="onRowAction($event)"
      (rowClick)="onRowClick($event)"
    />
  </div>
</section>
