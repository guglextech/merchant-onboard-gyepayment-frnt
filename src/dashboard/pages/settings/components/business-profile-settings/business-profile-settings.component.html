<section class="settings-panel">
  <h2 class="panel-title">Admin Profile</h2>
  <p class="panel-sub">Your admin identity from the active session.</p>

  <div class="row g-3 mb-1">
    <div class="col-md-6">
      <label for="s-username" class="form-label">Username</label>
      <input
        id="s-username"
        type="text"
        class="form-control"
        [value]="admin?.username ?? ''"
        readonly
      />
    </div>
    <div class="col-md-6">
      <label for="s-contact-email" class="form-label">Email</label>
      <input
        id="s-contact-email"
        type="email"
        class="form-control"
        [value]="admin?.email ?? ''"
        readonly
      />
    </div>
    <div class="col-md-6">
      <label for="s-admin-id" class="form-label">Admin ID</label>
      <input
        id="s-admin-id"
        type="text"
        class="form-control"
        [value]="admin?.id ?? ''"
        readonly
      />
    </div>
  </div>
</section>
