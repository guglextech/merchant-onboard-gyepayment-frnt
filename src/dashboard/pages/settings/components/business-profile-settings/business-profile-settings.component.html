<section class="settings-panel">
  <h2 class="panel-title">Business Profile</h2>
  <p class="panel-sub">Your merchant identity from the active session.</p>

  <div class="row g-3 mb-1">
    <div class="col-md-6">
      <label for="s-business-name" class="form-label">Business name</label>
      <input
        id="s-business-name"
        type="text"
        class="form-control"
        [value]="merchant?.businessName ?? ''"
        readonly
      />
    </div>
    <div class="col-md-6">
      <label for="s-merchant-code" class="form-label">Merchant code</label>
      <input
        id="s-merchant-code"
        type="text"
        class="form-control"
        [value]="merchant?.merchantCode ?? ''"
        readonly
      />
      <div class="form-text">Assigned by GYE Payment — cannot be changed.</div>
    </div>
    <div class="col-md-6">
      <label for="s-contact-email" class="form-label">Contact email</label>
      <input
        id="s-contact-email"
        type="email"
        class="form-control"
        [value]="merchant?.email ?? ''"
        readonly
      />
    </div>
    <div class="col-md-6">
      <label for="s-merchant-id" class="form-label">Merchant ID</label>
      <input
        id="s-merchant-id"
        type="text"
        class="form-control"
        [value]="merchant?.id ?? ''"
        readonly
      />
    </div>
  </div>

  <div class="divider"></div>

  <h3 class="sub-title">Status</h3>
  <div class="status-row">
    <span class="status-badge status-badge--active">{{ merchant?.status ?? 'UNKNOWN' }}</span>
    <span class="status-text">Account status from your current session.</span>
  </div>
</section>
